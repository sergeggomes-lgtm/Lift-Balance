name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # runs automatically on every push to main
  workflow_dispatch:   # lets you trigger it manually from the GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; new pushes cancel queued (not running) ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm --filter @workspace/lift-balance run build:pages
        env:
          # Automatically sets the base path to /<your-repo-name>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Fix SPA routing (404 → index)
        # Copies index.html to 404.html so GitHub Pages serves the React
        # app instead of a real 404 when someone opens a deep link directly.
        run: cp artifacts/lift-balance/dist/public/index.html artifacts/lift-balance/dist/public/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/lift-balance/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
